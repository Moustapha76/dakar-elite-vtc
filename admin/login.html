<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Admin – Dakar Elite VTC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --gold: #C9A227;
            --gold-dark: #9a7a18;
            --black: #0a0a0a;
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --border: rgba(201, 162, 39, 0.18);
            --text: #f5f5f5;
            --muted: #888;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.07) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 162, 39, 0.05) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .gem {
            font-size: 2.2rem;
            color: var(--gold);
            display: block;
            margin-bottom: 10px;
        }

        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--text);
            letter-spacing: 2px;
        }

        .login-logo h1 span {
            color: var(--gold);
        }

        .login-logo p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 14px 12px 40px;
            border-radius: 10px;
            font-size: 0.92rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-input::placeholder {
            color: #555;
        }

        .form-input:focus {
            border-color: var(--gold);
            background: rgba(201, 162, 39, 0.04);
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .show-pass-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .show-pass-btn:hover {
            color: var(--gold);
        }

        .error-msg {
            display: none;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.82rem;
            color: #e74c3c;
            margin-bottom: 18px;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--black);
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            opacity: 0.88;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: var(--muted);
        }

        .login-footer a {
            color: var(--gold);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-logo">
            <span class="gem">◆</span>
            <h1>DAKAR<span>ELITE</span> VTC</h1>
            <p>Panneau d'Administration</p>
        </div>
        <div class="divider"></div>

        <div class="error-msg" id="errorMsg">
            <i class="fas fa-circle-xmark"></i>
            <span id="errorText">Identifiants invalides.</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="username">Identifiant</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username"
                        required />
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="••••••••"
                        autocomplete="current-password" required />
                    <button type="button" class="show-pass-btn" id="togglePass" aria-label="Afficher le mot de passe">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-right-to-bracket"></i> Se Connecter
            </button>
        </form>

        <div class="login-footer">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> Retour au site</a>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        fetch('/api/auth/status', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                if (data.authenticated) window.location.href = 'admin.html';
            }).catch(() => { });

        // Toggle password visibility
        document.getElementById('togglePass').addEventListener('click', function () {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Login form submit
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            if (!username || !password) {
                errorText.textContent = 'Veuillez remplir tous les champs.';
                errorDiv.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch loading-spinner"></i> Connexion…';
            errorDiv.classList.remove('show');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                });
                const data = await res.json();

                if (res.ok && data.ok) {
                    btn.innerHTML = '<i class="fas fa-check"></i> Connecté !';
                    setTimeout(() => window.location.href = 'admin.html', 500);
                } else {
                    throw new Error(data.error || 'Identifiants invalides.');
                }
            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Se Connecter';
            }
        });
    </script>

</body>

</html>
